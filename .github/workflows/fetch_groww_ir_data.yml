name: Fetch Groww IR Data Every Hour

on:
  schedule:
    # Run every hour at the 0th minute
    - cron: '0 * * * *'
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas urllib3
      
      - name: Fetch Groww IR Data
        run: |
          cd Groww/IR_Data
          python fetch_groww_ir_data.py
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Commit and Push Changes
        run: |
          cd Groww/IR_Data
          git add groww_ir_data.csv groww_ir_data.jsonl
          git commit -m "Auto: Update Groww IR data - $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push origin HEAD:main || echo "Push failed, trying with token"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts (optional)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: groww-ir-data
          path: Groww/IR_Data/groww_ir_data.*
          retention-days: 30
